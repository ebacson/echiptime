    <script src="app.js"></script>

    <script>
        function showTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
                tab.style.display = 'none';
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            const selectedTab = document.getElementById(tabId);
            if (selectedTab) {
                selectedTab.style.display = 'block';
                selectedTab.classList.add('active');
            }
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        function showSubTab(subTabId) {
            // Hide all sub-tabs in current parent tab
            const parentTab = event.target.closest('.tab-content');
            if (parentTab) {
                parentTab.querySelectorAll('.sub-tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                parentTab.querySelectorAll('.sub-tab-button').forEach(btn => {
                    btn.classList.remove('active');
                });
            }

            // Show selected sub-tab
            document.getElementById(subTabId).classList.add('active');
            event.target.classList.add('active');
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return Infinity;
            const str = String(timeStr).trim();

            // HH:MM:SS.SSS (chip time / split with milliseconds)
            const dotIdx = str.indexOf('.');
            if (dotIdx > 0) {
                const base = timeStringToSeconds(str.slice(0, dotIdx));
                const ms = parseInt(str.slice(dotIdx + 1), 10) || 0;
                if (base > 0 || str.startsWith('00:')) return base + ms / 1000;
            }

            // Format: HH:MM:SS or MM:SS
            const parts = str.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
            } else if (parts.length === 3) {
                return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
            }
            return Infinity;
        }

        function filterDataByGender(data, genderFilter) {
            if (!data || data.length === 0 || genderFilter === 'Overall') {
                return data;
            }

            // Find gender column
            let genderIndex = -1;
            if (data[0]) {
                data[0].forEach((cell, index) => {
                    const cellStr = String(cell || '').trim().toLowerCase();
                    if (cellStr === 'gen' || cellStr === 'gender' || cellStr.includes('gen')) {
                        genderIndex = index;
                    }
                });
            }

            if (genderIndex === -1) {
                return data; // If no gender column found, return all data
            }

            // Filter data
            const filteredData = [data[0]]; // Keep header
            const targetGender = genderFilter.toLowerCase();
            
            for (let i = 1; i < data.length; i++) {
                const cellValue = String(data[i][genderIndex] || '').trim().toLowerCase();
                if (cellValue === targetGender || 
                    (targetGender === 'female' && (cellValue === 'f' || cellValue === 'nữ')) ||
                    (targetGender === 'male' && (cellValue === 'm' || cellValue === 'nam'))) {
                    filteredData.push(data[i]);
                }
            }

            return filteredData;
        }

        function collectUniqueAgeGroups(metadata) {
            const set = new Set();
            if (!metadata || !Array.isArray(metadata)) return [];
            metadata.forEach(item => {
                const a = item && item.athlete && item.athlete.age != null
                    ? String(item.athlete.age).trim() : '';
                if (a) set.add(a);
            });
            return Array.from(set).sort((a, b) => a.localeCompare(b, 'vi'));
        }

        function filterDataByAgeGroup(data, ageFilter) {
            if (!data || data.length === 0 || !ageFilter || ageFilter === 'All') {
                return data;
            }
            let ageIndex = -1;
            if (data[0]) {
                data[0].forEach((cell, index) => {
                    const cellStr = String(cell || '').trim().toLowerCase();
                    if (cellStr === 'nhóm tuổi' || cellStr === 'age' || cellStr.includes('tuổi')) {
                        ageIndex = index;
                    }
                });
            }
            if (ageIndex === -1) return data;
            const filteredData = [data[0]];
            const target = String(ageFilter).trim();
            for (let i = 1; i < data.length; i++) {
                const cellValue = String(data[i][ageIndex] || '').trim();
                if (cellValue === target) filteredData.push(data[i]);
            }
            return filteredData;
        }

        window.ageGroupFilters = window.ageGroupFilters || {};
        window.tableSources = window.tableSources || {};

        function setAgeFilter(namespace, value) {
            window.ageGroupFilters[namespace] = value === 'All' ? 'All' : String(value);
        }

        function getAgeFilter(namespace) {
            const v = window.ageGroupFilters[namespace];
            return v && v !== 'All' ? v : 'All';
        }

        function injectAgeGroupControls(containerEl, namespace, metadata) {
            if (!containerEl) return;
            const ages = collectUniqueAgeGroups(metadata);
            containerEl.innerHTML = '';
            if (ages.length === 0) return;
            const wrap = document.createElement('div');
            wrap.className = 'age-filter-wrap';
            const label = document.createElement('span');
            label.className = 'age-filter-label';
            label.textContent = 'Nhóm tuổi';
            const tabs = document.createElement('div');
            tabs.className = 'sub-tabs age-sub-tabs';
            const cur = getAgeFilter(namespace);
            const mkBtn = (caption, ageVal, active) => {
                const b = document.createElement('button');
                b.type = 'button';
                b.dataset.ageGroup = ageVal === 'All' ? 'All' : String(ageVal);
                b.className = 'sub-tab-button' + (active ? ' active' : '');
                b.textContent = caption;
                b.onclick = () => selectAgeGroup(namespace, ageVal, tabs);
                return b;
            };
            tabs.appendChild(mkBtn('Tất cả', 'All', cur === 'All'));
            ages.forEach(ag => {
                tabs.appendChild(mkBtn(ag, ag, cur === ag));
            });
            wrap.appendChild(label);
            wrap.appendChild(tabs);
            containerEl.appendChild(wrap);
            setAgeFilter(namespace, cur === 'All' ? 'All' : cur);
        }

        function selectAgeGroup(namespace, ageVal, tabsEl) {
            setAgeFilter(namespace, ageVal);
            const key = ageVal === 'All' ? 'All' : String(ageVal);
            if (tabsEl && tabsEl.querySelectorAll) {
                tabsEl.querySelectorAll('.sub-tab-button').forEach(btn => {
                    const v = btn.dataset.ageGroup || 'All';
                    btn.classList.toggle('active', v === key);
                });
            }
            if (namespace === 'ekiden3') refreshEkidenRace3Tables();
            else if (namespace.startsWith('dist-')) refreshDistanceTables(namespace.replace('dist-', ''));
        }

        function refreshEkidenRace3Tables() {
            const src = window.tableSources.ekiden3;
            if (!src || !src.data) return;
            const age = getAgeFilter('ekiden3');
            const cpDist = src.cpDistancesCumulative || {};
            createTable(src.data, 'table-3-overall', 'Overall', src.data, src.metadata, src.checkpoints, age, cpDist);
            createTable(src.data, 'table-3-female', 'Female', src.data, src.metadata, src.checkpoints, age, cpDist);
            createTable(src.data, 'table-3-male', 'Male', src.data, src.metadata, src.checkpoints, age, cpDist);
        }

        function refreshDistanceTables(indexStr) {
            const idx = parseInt(indexStr, 10);
            const ns = 'dist-' + idx;
            const src = window.tableSources[ns];
            if (!src || !src.data) return;
            const age = getAgeFilter(ns);
            const cpDist = src.cpDistancesCumulative || {};
            createTable(src.data, `table-${idx}-overall`, 'Overall', src.data, src.metadata, src.checkpoints, age, cpDist);
            createTable(src.data, `table-${idx}-female`, 'Female', src.data, src.metadata, src.checkpoints, age, cpDist);
            createTable(src.data, `table-${idx}-male`, 'Male', src.data, src.metadata, src.checkpoints, age, cpDist);
        }

        function calculateRankings(originalData, chiptimeIndex, genderIndex) {
            if (!originalData || originalData.length < 2 || chiptimeIndex < 0) {
                return { overall: {}, byGender: { female: {}, male: {} } };
            }
            
            // Sort all data by chiptime
            const sortedAll = [...originalData.slice(1)].sort((a, b) => {
                const timeA = timeToSeconds(a[chiptimeIndex]);
                const timeB = timeToSeconds(b[chiptimeIndex]);
                return timeA - timeB;
            });
            
            // Calculate overall rankings
            const overallRankings = {};
            sortedAll.forEach((row, index) => {
                const bibIndex = originalData[0].findIndex(h => {
                    const hStr = String(h || '').toLowerCase();
                    return hStr.includes('bib') || hStr.includes('bib');
                });
                const nameIndex = originalData[0].findIndex(h => {
                    const hStr = String(h || '').toLowerCase();
                    return hStr === 'name' || hStr.includes('name');
                });
                
                const key = bibIndex >= 0 ? String(row[bibIndex]) : (nameIndex >= 0 ? String(row[nameIndex]) : index);
                overallRankings[key] = index + 1;
            });
            
            // Calculate rankings by gender
            const femaleRankings = {};
            const maleRankings = {};
            
            if (genderIndex >= 0) {
                const sortedFemale = sortedAll.filter(row => {
                    const gender = String(row[genderIndex] || '').trim().toLowerCase();
                    return gender === 'f' || gender === 'female' || gender === 'nữ';
                });
                
                const sortedMale = sortedAll.filter(row => {
                    const gender = String(row[genderIndex] || '').trim().toLowerCase();
                    return gender === 'm' || gender === 'male' || gender === 'nam';
                });
                
                sortedFemale.forEach((row, index) => {
                    const bibIndex = originalData[0].findIndex(h => {
                        const hStr = String(h || '').toLowerCase();
                        return hStr.includes('bib') || hStr.includes('bib');
                    });
                    const nameIndex = originalData[0].findIndex(h => {
                        const hStr = String(h || '').toLowerCase();
                        return hStr === 'name' || hStr.includes('name');
                    });
                    
                    const key = bibIndex >= 0 ? String(row[bibIndex]) : (nameIndex >= 0 ? String(row[nameIndex]) : index);
                    femaleRankings[key] = index + 1;
                });
                
                sortedMale.forEach((row, index) => {
                    const bibIndex = originalData[0].findIndex(h => {
                        const hStr = String(h || '').toLowerCase();
                        return hStr.includes('bib') || hStr.includes('bib');
                    });
                    const nameIndex = originalData[0].findIndex(h => {
                        const hStr = String(h || '').toLowerCase();
                        return hStr === 'name' || hStr.includes('name');
                    });
                    
                    const key = bibIndex >= 0 ? String(row[bibIndex]) : (nameIndex >= 0 ? String(row[nameIndex]) : index);
                    maleRankings[key] = index + 1;
                });
            }
            
            return {
                overall: overallRankings,
                byGender: { female: femaleRankings, male: maleRankings }
            };
        }

        // Store metadata for split time calculation
        const tableMetadata = {};

        function createTable(data, tableId, genderFilter = 'Overall', originalData = null, metadata = null, checkpoints = null, ageGroupFilter = 'All', cpDistancesCumulative = null) {
            // Use original data if provided, otherwise use filtered data
            const dataForRanking = originalData || data;
            
            // Filter data by gender if needed
            let filteredData = filterDataByGender(data, genderFilter);
            filteredData = filterDataByAgeGroup(filteredData, ageGroupFilter);
            
            // Filter metadata by gender if needed
            let filteredMetadata = metadata;
            if (metadata && genderFilter !== 'Overall') {
                filteredMetadata = filteredMetadata.filter(item => {
                    if (!item || !item.athlete) return false;
                    const gender = String(item.athlete.gen || '').trim().toLowerCase();
                    const targetGender = genderFilter.toLowerCase();
                    return gender === targetGender || 
                           (targetGender === 'female' && (gender === 'f' || gender === 'nữ')) ||
                           (targetGender === 'male' && (gender === 'm' || gender === 'nam'));
                });
            }
            if (filteredMetadata && ageGroupFilter && ageGroupFilter !== 'All') {
                filteredMetadata = filteredMetadata.filter(item => {
                    if (!item || !item.athlete) return false;
                    const age = String(item.athlete.age || '').trim();
                    return age === String(ageGroupFilter).trim();
                });
            }
            
            // Store metadata for this table (use filtered metadata)
            if (filteredMetadata) {
                tableMetadata[tableId] = filteredMetadata;
            }
            if (checkpoints) {
                tableMetadata[tableId + '_checkpoints'] = checkpoints;
            }
            if (cpDistancesCumulative) {
                tableMetadata[tableId + '_cpDistances'] = cpDistancesCumulative;
            }
            
            if (!filteredData || filteredData.length === 0) {
                document.getElementById(tableId).innerHTML = '<p style="text-align: center; padding: 20px;">Không có dữ liệu</p>';
                return;
            }

            // Columns to always hide
            const columnsToHide = ['Age', 'age', 'AGE', 'TagID', 'tagid', 'TAGID', 'Tag Id', 'tag id', 'TAG ID'];
            
            // Columns to show in main view
            const columnsToShow = ['BIB', 'Bib', 'bib', 'Name', 'name', 'NAME', 'Gen', 'gen', 'GEN', 'Gender', 'gender',
                                   'Nhóm tuổi', 'nhóm tuổi', 'NHÓM TUỔI',
                                   'Distance', 'distance', 'DISTANCE', 'START', 'Start', 'start', 
                                   'CP1', 'cp1', 'CP2', 'cp2', 'CP3', 'cp3', 
                                   'FINISH', 'Finish', 'finish', 
                                   'Chip Time', 'ChipTime', 'chiptime', 'CHIPTIME', 'Chip time'];
            
            const hideIndices = [];
            const showIndices = [];
            let chiptimeIndex = -1;
            const columnMap = {}; // Map column name to index
            
            if (data[0]) {
                data[0].forEach((cell, index) => {
                    const cellStr = String(cell || '').trim();
                    columnMap[cellStr] = index;
                    
                    if (columnsToHide.includes(cellStr)) {
                        hideIndices.push(index);
                    }
                    
                    // Check if column should be shown
                    const shouldShow = columnsToShow.some(col => {
                        const cellLower = cellStr.toLowerCase();
                        const colLower = col.toLowerCase();
                        return cellLower === colLower || cellLower.includes(colLower) || colLower.includes(cellLower);
                    });
                    
                    if (shouldShow && !hideIndices.includes(index)) {
                        showIndices.push(index);
                    }
                    
                    // Find chiptime column (case insensitive)
                    if (cellStr.toLowerCase().includes('chiptime') || cellStr.toLowerCase().includes('chip time')) {
                        chiptimeIndex = index;
                    }
                });
            }

            // Find gender index for ranking calculation
            let genderIndex = -1;
            if (dataForRanking && dataForRanking[0]) {
                dataForRanking[0].forEach((cell, index) => {
                    const cellStr = String(cell || '').trim().toLowerCase();
                    if (cellStr === 'gen' || cellStr === 'gender' || cellStr.includes('gen')) {
                        genderIndex = index;
                    }
                });
            }
            
            // Calculate rankings if we have original data
            let rankings = null;
            if (dataForRanking && chiptimeIndex >= 0 && dataForRanking.length > 1) {
                rankings = calculateRankings(dataForRanking, chiptimeIndex, genderIndex);
                rankingsData[tableId] = rankings;
            }
            
            // Sort filtered data: 
            // 1. Finished athletes (by chip time)
            // 2. Athletes with START data (by checkpoint time)
            // 3. Athletes without any data (at the end)
            if (filteredData.length > 1) {
                // Find checkpoint indices and chip time index
                const checkpointIndices = [];
                let finishIndex = -1;
                let startIndex = -1;
                
                if (filteredData[0]) {
                    filteredData[0].forEach((cell, index) => {
                        const cellStr = String(cell || '').trim().toUpperCase();
                        if (cellStr === 'FINISH' || cellStr.includes('FINISH')) {
                            finishIndex = index;
                        } else if (cellStr === 'START' || cellStr.includes('START')) {
                            startIndex = index;
                        } else if (cellStr.startsWith('CP') || cellStr.includes('CP1') || cellStr.includes('CP2') || cellStr.includes('CP3')) {
                            checkpointIndices.push(index);
                        }
                    });
                }
                
                // Sort by checkpoint time or chip time
                const sortedData = [filteredData[0], ...filteredData.slice(1).sort((a, b) => {
                    // Check if athletes have START data
                    const aHasStart = startIndex >= 0 && a[startIndex] && String(a[startIndex]).trim();
                    const bHasStart = startIndex >= 0 && b[startIndex] && String(b[startIndex]).trim();
                    
                    // Athletes without START data go to the end
                    if (!aHasStart && bHasStart) return 1;
                    if (aHasStart && !bHasStart) return -1;
                    
                    // If both have finish time, sort by chip time
                    if (chiptimeIndex >= 0 && a[chiptimeIndex] && b[chiptimeIndex]) {
                        const timeA = timeToSeconds(a[chiptimeIndex]);
                        const timeB = timeToSeconds(b[chiptimeIndex]);
                        if (timeA !== Infinity && timeB !== Infinity) {
                            return timeA - timeB;
                        }
                    }
                    
                    // If one has finish time, it comes first (among those with START)
                    if (finishIndex >= 0) {
                        const aHasFinish = a[finishIndex] && String(a[finishIndex]).trim();
                        const bHasFinish = b[finishIndex] && String(b[finishIndex]).trim();
                        if (aHasFinish && !bHasFinish) return -1;
                        if (!aHasFinish && bHasFinish) return 1;
                    }
                    
                    // Sort by last checkpoint time (from last to first)
                    // Order: FINISH > CP3 > CP2 > CP1 > START
                    const allCheckpoints = [];
                    if (finishIndex >= 0) allCheckpoints.push(finishIndex);
                    checkpointIndices.sort().reverse().forEach(idx => allCheckpoints.push(idx)); // CP3, CP2, CP1
                    if (startIndex >= 0) allCheckpoints.push(startIndex);
                    
                    for (const cpIndex of allCheckpoints) {
                        const aTime = a[cpIndex] ? timeToSeconds(a[cpIndex]) : Infinity;
                        const bTime = b[cpIndex] ? timeToSeconds(b[cpIndex]) : Infinity;
                        
                        // If both have time at this checkpoint, sort by it
                        if (aTime !== Infinity && bTime !== Infinity) {
                            return aTime - bTime;
                        }
                        // If only one has time, it comes first
                        if (aTime !== Infinity && bTime === Infinity) return -1;
                        if (aTime === Infinity && bTime !== Infinity) return 1;
                    }
                    
                    // If no checkpoint times, maintain original order
                    return 0;
                })];
                filteredData = sortedData;
            }
            
            // Find BIB and Name indices for ranking lookup
            let bibIndex = -1;
            let nameIndex = -1;
            if (filteredData[0]) {
                filteredData[0].forEach((cell, index) => {
                    const cellStr = String(cell || '').trim().toLowerCase();
                    if (cellStr.includes('bib')) {
                        bibIndex = index;
                    }
                    if (cellStr === 'name') {
                        nameIndex = index;
                    }
                });
            }

            let html = '<table><thead><tr>';
            
            // Add ranking column header first
            html += '<th>Xếp hạng</th>';
            
            // Create header row (only show selected columns)
            if (data[0]) {
                showIndices.forEach(index => {
                    const cell = data[0][index];
                    html += `<th>${cell || `Cột ${index + 1}`}</th>`;
                });
                html += '</tr></thead><tbody>';
            }

            // Create data rows
            for (let i = 1; i < filteredData.length; i++) {
                const rowId = `row-${tableId}-${i}`;
                const detailId = `detail-${tableId}-${i}`;
                
                // Get key for ranking lookup
                const rowKey = bibIndex >= 0 ? String(filteredData[i][bibIndex]) : 
                              (nameIndex >= 0 ? String(filteredData[i][nameIndex]) : i);
                
                // Get rankings for this person
                let overallRank = '-';
                let genderRank = '-';
                if (rankings) {
                    overallRank = rankings.overall[rowKey] || '-';
                    if (genderIndex >= 0) {
                        const gender = String(filteredData[i][genderIndex] || '').trim().toLowerCase();
                        if (gender === 'f' || gender === 'female' || gender === 'nữ') {
                            genderRank = rankings.byGender.female[rowKey] || '-';
                        } else if (gender === 'm' || gender === 'male' || gender === 'nam') {
                            genderRank = rankings.byGender.male[rowKey] || '-';
                        }
                    }
                }
                
                // Main row (clickable)
                html += `<tr class="expandable" onclick="toggleDetail('${detailId}', this)">`;
                // Add ranking number (always show current filter ranking)
                html += `<td style="text-align: center; font-weight: bold;">${i}</td>`;
                
                // Show only selected columns
                showIndices.forEach(index => {
                    const cellValue = filteredData[i][index] !== null && filteredData[i][index] !== undefined ? filteredData[i][index] : '';
                    html += `<td>${cellValue}</td>`;
                });
                html += '</tr>';
                
                // Detail row (hidden by default)
                html += `<tr id="${detailId}" class="detail-row" style="display: none;">`;
                html += `<td colspan="${showIndices.length + 1}">`;
                html += '<div style="padding: 10px;">';
                html += '<strong style="color: #ff66b3; font-size: 1.1em;">Chi tiết:</strong><br><br>';
                
                // Show rankings if available
                if (rankings && (tableId.includes('table-3') || tableId.includes('table-14'))) {
                    html += `<span class="detail-label">Xếp hạng tổng thể:</span>`;
                    html += `<span class="detail-content"><strong>${overallRank}</strong></span><br>`;
                    if (genderRank !== '-') {
                        html += `<span class="detail-label">Xếp hạng theo giới tính:</span>`;
                        html += `<span class="detail-content"><strong>${genderRank}</strong></span><br><br>`;
                    } else {
                        html += '<br>';
                    }
                }
                
                // Show split times if metadata is available
                const metadata = tableMetadata[tableId];
                const checkpoints = tableMetadata[tableId + '_checkpoints'];
                
                // Find metadata by BIB or Name instead of index
                let athleteMetadata = null;
                if (metadata && checkpoints && Array.isArray(metadata)) {
                    const bibValue = bibIndex >= 0 ? String(filteredData[i][bibIndex] || '').trim() : '';
                    const nameValue = nameIndex >= 0 ? String(filteredData[i][nameIndex] || '').trim() : '';
                    
                    athleteMetadata = metadata.find(item => {
                        if (!item || !item.athlete) return false;
                        const itemBib = String(item.athlete.bib || '').trim();
                        const itemName = String(item.athlete.name || '').trim();
                        
                        // Match by BIB if available, otherwise by Name
                        if (bibValue && itemBib) {
                            return itemBib === bibValue;
                        }
                        if (nameValue && itemName) {
                            return itemName === nameValue;
                        }
                        return false;
                    });
                }
                
                if (athleteMetadata && checkpoints && Array.isArray(checkpoints)) {
                    const times = athleteMetadata.times || {};
                    const cpDist = tableMetadata[tableId + '_cpDistances'] || {};
                    const timingLines = buildCheckpointTimingLines(
                        times, checkpoints, cpDist, athleteMetadata.athlete
                    );

                    if (timingLines.length > 0) {
                        html += '<strong style="color: #ff66b3; font-size: 1em;">Thời gian checkpoint:</strong><br>';
                        timingLines.forEach(line => {
                            html += `<span class="detail-label">${line.cp}:</span>`;
                            html += `<span class="detail-content">${line.clock}`;
                            if (line.cumulative) {
                                html += ` <em>(${line.cumulative} từ START)</em>`;
                            }
                            html += '</span><br>';
                            if (line.cumulativePace) {
                                html += `<span class="detail-label">Pace tới ${line.cp}:</span>`;
                                html += `<span class="detail-content"><strong>${line.cumulativePace}</strong>`;
                                if (line.cumulativeKm > 0) html += ` · ${line.cumulativeKm} km`;
                                html += '</span><br>';
                            }
                            if (line.segment) {
                                const fromCp = line.fromCp || 'START';
                                html += `<span class="detail-label">Đoạn ${fromCp} → ${line.cp}:</span>`;
                                html += `<span class="detail-content"><strong>${line.segment}</strong>`;
                                if (line.segmentPace) html += ` · pace <strong>${line.segmentPace}</strong>`;
                                if (line.segmentKm > 0) html += ` · ${line.segmentKm} km`;
                                html += '</span><br>';
                            }
                        });

                        if (times['START'] && times['FINISH']) {
                            const chipTime = calculateTimeDifference(times['START'], times['FINISH']);
                            html += `<span class="detail-label">Chip Time:</span>`;
                            html += `<span class="detail-content"><strong>${chipTime}</strong></span><br>`;
                            const distance = parseDistance(athleteMetadata.athlete?.distance || '');
                            if (distance > 0) {
                                const chipSec = (times['FINISH'] - times['START']) / 1000;
                                html += `<span class="detail-label">Pace tổng:</span>`;
                                html += `<span class="detail-content"><strong>${calculatePace(chipSec, distance)}</strong></span><br>`;
                            }
                        }
                        html += '<br>';
                    }
                }
                
                // Show all columns (except hidden ones)
                if (filteredData[0]) {
                    filteredData[0].forEach((header, index) => {
                        if (!hideIndices.includes(index) && !showIndices.includes(index)) {
                            const headerStr = String(header || '').trim();
                            const cellValue = filteredData[i][index] !== null && filteredData[i][index] !== undefined ? filteredData[i][index] : '';
                            if (headerStr) {
                                html += `<span class="detail-label">${headerStr}:</span>`;
                                html += `<span class="detail-content">${cellValue}</span><br>`;
                            }
                        }
                    });
                }
                html += '</div>';
                html += '</td></tr>';
            }

            html += '</tbody></table>';
            document.getElementById(tableId).innerHTML = html;
        }

        function toggleDetail(detailId, row) {
            const detailRow = document.getElementById(detailId);
            if (detailRow.style.display === 'none') {
                detailRow.style.display = '';
                row.classList.add('expanded');
            } else {
                detailRow.style.display = 'none';
                row.classList.remove('expanded');
            }
        }

        // Store original rankings
        const originalRankings = {};

        function filterTable(tableId, searchId) {
            const searchInput = document.getElementById(searchId);
            const filter = searchInput.value.toLowerCase().trim();
            const table = document.getElementById(tableId);
            
            if (!table) return;
            
            const rows = Array.from(table.querySelectorAll('tbody tr')).filter(row => !row.classList.contains('detail-row'));
            let visibleCount = 0;
            
            // Store original rankings if not already stored
            if (!originalRankings[tableId]) {
                originalRankings[tableId] = {};
                rows.forEach((row, index) => {
                    const firstCell = row.querySelector('td');
                    if (firstCell) {
                        originalRankings[tableId][index] = firstCell.textContent;
                    }
                });
            }
            
            rows.forEach((row, index) => {
                if (filter === '') {
                    // Show row and keep original ranking (don't change it)
                    row.style.display = '';
                } else {
                    // Get all cells in the row
                    const cells = row.querySelectorAll('td');
                    let found = false;
                    
                    cells.forEach(cell => {
                        const cellText = cell.textContent || cell.innerText;
                        const cellLower = cellText.toLowerCase();
                        
                        // Check if search term matches (fuzzy search)
                        if (cellLower.includes(filter)) {
                            found = true;
                        }
                    });
                    
                    if (found) {
                        row.style.display = '';
                        visibleCount++;
                        // Don't update ranking - keep original
                    } else {
                        row.style.display = 'none';
                    }
                }
            });
            
            // Handle detail rows
            const allRows = table.querySelectorAll('tbody tr');
            allRows.forEach(row => {
                if (row.classList.contains('detail-row')) {
                    const prevRow = row.previousElementSibling;
                    if (prevRow && prevRow.style.display === 'none') {
                        row.style.display = 'none';
                    }
                }
            });
            
            // Show message if no results
            const tbody = table.querySelector('tbody');
            if (tbody) {
                let noResultsMsg = tbody.querySelector('.no-results');
                if (visibleCount === 0 && filter !== '') {
                    if (!noResultsMsg) {
                        noResultsMsg = document.createElement('tr');
                        noResultsMsg.className = 'no-results';
                        noResultsMsg.innerHTML = `<td colspan="100%" style="text-align: center; padding: 20px; color: #999;">Không tìm thấy kết quả nào</td>`;
                        tbody.appendChild(noResultsMsg);
                    }
                } else if (noResultsMsg) {
                    noResultsMsg.remove();
                }
            }
        }

        function loadExcelFile(filename, loadingId, errorId, tableId, genderFilter = 'Overall') {
            const loadingDiv = document.getElementById(loadingId);
            const errorDiv = document.getElementById(errorId);
            const tableDiv = document.getElementById(tableId);

            fetch(filename)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Không thể tải file: ${filename}`);
                    }
                    return response.arrayBuffer();
                })
                .then(data => {
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'none';
                    
                    createTable(jsonData, tableId, genderFilter);
                })
                .catch(error => {
                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = `Lỗi: ${error.message}`;
                    tableDiv.innerHTML = '';
                });
        }

        // Store data for filtering and ranking calculations
        let race3Data = null;
        let race14Data = null;
        
        // Store rankings for each person
        const rankingsData = {
            'table-3-overall': null,
            'table-3-female': null,
            'table-3-male': null,
            'table-14': null
        };

        // Cùng danh sách checkpoint với iOS (ResultsConverter.allCheckpoints)
        const ALL_CHECKPOINTS = ['START', 'CP1', 'CP2', 'CP3', 'CP4', 'CP5', 'CP6', 'CP7', 'CP8', 'FINISH'];

        let firebaseValueUnsubscribe = null;
        let activeEventContext = { uid: '', eventKey: '', dbPath: '' };

        /** Giống FirebaseKeySanitizer trên iOS — ký tự . # $ [ ] / → _ */
        function firebaseKeySanitize(s) {
            return String(s || '').replace(/[.#$\[\]\/]/g, '_');
        }

        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                uid: (params.get('uid') || '').trim(),
                event: (params.get('event') || params.get('event_name') || '').trim(),
                fixture: (params.get('fixture') || '').trim()
            };
        }

        /** Node có cấu trúc một giải (Athletes / RACE_CONFIG / checkpoint) */
        function isEventPayload(data) {
            if (!data || typeof data !== 'object' || Array.isArray(data)) return false;
            if (data.Athletes || data.RACE_CONFIG) return true;
            return ALL_CHECKPOINTS.some(cp => data[cp] != null);
        }

        function buildEventDbPath(uid, eventKey) {
            const ev = firebaseKeySanitize(eventKey);
            const u = (uid || '').trim();
            if (u) {
                return `${firebaseKeySanitize(u)}/${ev}`;
            }
            return ev;
        }

        function getEventDisplayName(eventData, fallbackKey) {
            const cfg = eventData && eventData.RACE_CONFIG;
            const name = cfg && cfg.event_name;
            if (name && String(name).trim()) {
                return String(name).trim();
            }
            return String(fallbackKey || '').replace(/_/g, ' ');
        }

        function showGlobalError(message) {
            document.querySelectorAll('.loading').forEach(el => { el.style.display = 'none'; });
            document.querySelectorAll('.error').forEach(el => {
                el.style.display = 'block';
                el.textContent = `Lỗi: ${message}`;
            });
        }

        function detachFirebaseListener() {
            if (firebaseValueUnsubscribe) {
                firebaseValueUnsubscribe();
                firebaseValueUnsubscribe = null;
            }
        }

        function buildShareUrl(uid, eventKey) {
            const base = `${window.location.origin}${window.location.pathname}`;
            const params = new URLSearchParams();
            if (uid) params.set('uid', uid);
            if (eventKey) params.set('event', eventKey);
            const qs = params.toString();
            return qs ? `${base}?${qs}` : base;
        }

        async function copyToClipboard(text) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch (_) {}
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.setAttribute('readonly', 'true');
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                return ok;
            } catch (_) {
                return false;
            }
        }

        function updateCopyLinkButton() {
            const btn = document.getElementById('copy-link-btn');
            if (!btn) return;
            const uid = (activeEventContext && activeEventContext.uid) ? String(activeEventContext.uid) : '';
            const eventKey = (activeEventContext && activeEventContext.eventKey) ? String(activeEventContext.eventKey) : '';
            if (!eventKey) {
                btn.style.display = 'none';
                return;
            }
            btn.style.display = 'inline-block';
            btn.onclick = async () => {
                const url = buildShareUrl(uid, eventKey);
                const ok = await copyToClipboard(url);
                const old = btn.textContent;
                btn.textContent = ok ? 'Đã copy' : 'Copy lỗi';
                setTimeout(() => { btn.textContent = old || 'Copy link'; }, 1200);
            };
        }

        function attachFirebaseListener(dbPath, onData) {
            detachFirebaseListener();
            const dataRef = window.firebaseRef(window.firebaseDatabase, dbPath);
            let lastAppliedAt = 0;
            let timer = null;
            let pending = null;
            const MIN_INTERVAL_MS = 600;

            const flush = () => {
                timer = null;
                lastAppliedAt = Date.now();
                const d = pending;
                pending = null;
                if (d != null) onData(d);
            };

            const schedule = (data) => {
                pending = data;
                if (timer) return;
                const now = Date.now();
                const wait = Math.max(0, MIN_INTERVAL_MS - (now - lastAppliedAt));
                timer = setTimeout(flush, wait);
            };

            firebaseValueUnsubscribe = window.firebaseOnValue(dataRef, (snap) => {
                if (snap.exists()) {
                    schedule(snap.val());
                }
            });
        }

        function renderEventPicker(events, selectedPath) {
            const wrap = document.getElementById('event-picker-wrap');
            const select = document.getElementById('event-picker');
            if (!wrap || !select || events.length <= 1) {
                if (wrap) wrap.style.display = 'none';
                return;
            }
            wrap.style.display = 'block';
            select.innerHTML = events.map(ev => {
                const label = ev.displayName || ev.eventKey.replace(/_/g, ' ');
                const selected = ev.dbPath === selectedPath ? ' selected' : '';
                return `<option value="${ev.dbPath}"${selected}>${label}</option>`;
            }).join('');
            select.onchange = () => {
                const chosen = events.find(e => e.dbPath === select.value);
                if (chosen) {
                    loadDataFromFirebase(chosen.uid, chosen.eventKey, chosen.displayName);
                }
            };
        }

        /** Quét RTDB: legacy {event}/... hoặc iOS {uid}/{event}/... */
        async function discoverEvents() {
            const rootRef = window.firebaseRef(window.firebaseDatabase, '/');
            const snapshot = await window.firebaseGet(rootRef);
            if (!snapshot.exists()) return [];

            const rootData = snapshot.val() || {};
            const found = [];

            for (const rootKey of Object.keys(rootData)) {
                const node = rootData[rootKey];
                if (!node || typeof node !== 'object') continue;

                if (isEventPayload(node)) {
                    found.push({
                        uid: '',
                        eventKey: rootKey,
                        dbPath: firebaseKeySanitize(rootKey),
                        displayName: getEventDisplayName(node, rootKey)
                    });
                    continue;
                }

                for (const eventKey of Object.keys(node)) {
                    const eventNode = node[eventKey];
                    if (isEventPayload(eventNode)) {
                        found.push({
                            uid: rootKey,
                            eventKey: eventKey,
                            dbPath: buildEventDbPath(rootKey, eventKey),
                            displayName: getEventDisplayName(eventNode, eventKey)
                        });
                    }
                }
            }

            return found;
        }

        async function resolveEventTarget() {
            const qp = getQueryParams();
            if (qp.fixture) {
                return {
                    uid: '',
                    eventKey: qp.fixture,
                    dbPath: '',
                    displayName: qp.fixture.replace(/_/g, ' ')
                };
            }
            if (qp.uid && qp.event) {
                return {
                    uid: qp.uid,
                    eventKey: qp.event,
                    dbPath: buildEventDbPath(qp.uid, qp.event),
                    displayName: qp.event.replace(/_/g, ' ')
                };
            }
            if (qp.event && !qp.uid) {
                return {
                    uid: '',
                    eventKey: qp.event,
                    dbPath: firebaseKeySanitize(qp.event),
                    displayName: qp.event.replace(/_/g, ' ')
                };
            }

            const all = await discoverEvents();
            if (all.length === 0) {
                throw new Error('Không tìm thấy giải chạy trên Firebase');
            }

            if (qp.uid && !qp.event) {
                const forUid = all.filter(e => e.uid === qp.uid || firebaseKeySanitize(e.uid) === firebaseKeySanitize(qp.uid));
                if (forUid.length === 0) {
                    throw new Error('Không có giải nào cho uid đã chỉ định');
                }
                if (forUid.length === 1) return forUid[0];
                renderEventPicker(forUid, forUid[0].dbPath);
                return forUid[0];
            }

            if (all.length === 1) return all[0];
            renderEventPicker(all, all[0].dbPath);
            return all[0];
        }

        // Format RACE_CONFIG start_time for display: "2026-01-24 17:50:00:000" -> "24/01/2026 17:50"
        function formatStartTimeDisplay(startTimeStr) {
            if (!startTimeStr || typeof startTimeStr !== 'string') return '';
            const s = startTimeStr.trim();
            const parts = s.split(' ');
            if (parts.length < 2) return s;
            const [datePart, timePart] = parts;
            const [y, m, d] = datePart.split('-');
            const timeShort = timePart.split(':').slice(0, 2).join(':'); // HH:mm
            if (d && m && y) return `${d}/${m}/${y} ${timeShort}`;
            return s;
        }

        // Function to parse datetime string from Firebase (yyyy-MM-dd HH:mm:ss:SSS)
        function parseFirebaseDateTime(dateTimeStr) {
            const s = String(dateTimeStr || '').trim();
            if (!s) return null;
            const msMatch = s.match(/^(\d{4}-\d{2}-\d{2}) (\d{2}):(\d{2}):(\d{2}):(\d{3})$/);
            if (msMatch) {
                const [, datePart, hh, mm, ss, ms] = msMatch;
                return new Date(`${datePart}T${hh}:${mm}:${ss}.${ms}`);
            }
            const parts = s.split(' ');
            if (parts.length !== 2) return null;
            const timePart = parts[1].split(':').slice(0, 3).join(':');
            return new Date(`${parts[0]}T${timePart}`);
        }

        function formatDurationMillis(ms) {
            const total = Math.max(0, Math.round(ms));
            const h = Math.floor(total / 3600000);
            const rem = total % 3600000;
            const m = Math.floor(rem / 60000);
            const rem2 = rem % 60000;
            const s = Math.floor(rem2 / 1000);
            const sub = rem2 % 1000;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(sub).padStart(3, '0')}`;
        }

        // Function to calculate chip time (FINISH - START) with millisecond precision
        function calculateTimeDifference(startTime, endTime) {
            if (!startTime || !endTime) return '';
            const diffMs = Math.max(0, Math.round(endTime - startTime));
            return formatDurationMillis(diffMs);
        }

        // Function to calculate Pace (time per km) from time in seconds and distance in km
        function calculatePace(timeInSeconds, distanceInKm) {
            if (!timeInSeconds || !distanceInKm || distanceInKm <= 0) return '';
            const paceInSeconds = timeInSeconds / distanceInKm;
            const minutes = Math.floor(paceInSeconds / 60);
            const seconds = Math.floor(paceInSeconds % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}/km`;
        }

        // Function to parse distance string to number (e.g., "14.4KM" -> 14.4)
        function parseDistance(distanceStr) {
            if (!distanceStr) return 0;
            const str = String(distanceStr).trim().toUpperCase();
            // Remove "KM" and convert to number
            const numStr = str.replace(/KM$/, '').trim();
            const num = parseFloat(numStr);
            return isNaN(num) ? 0 : num;
        }

        // Function to convert time string (HH:MM:SS) to seconds
        function timeStringToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = String(timeStr).split(':');
            if (parts.length === 3) {
                // HH:MM:SS
                return parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
            } else if (parts.length === 2) {
                // MM:SS
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }
            return 0;
        }

        /** Dòng upload iOS: `CHECKPOINT#yyyy-MM-dd HH:mm:ss:SSS#rssi#antenna` */
        function parseResultLine(raw) {
            if (typeof raw !== 'string') return null;
            const parts = raw.split('#');
            if (parts.length < 4) return null;
            return { checkpoint: parts[0], timestampRaw: parts[1], rssi: parts[2], antenna: parts[3] };
        }

        /** Lấy thời điểm sớm nhất trong `lines` (CP khác START). */
        function getEarliestTime(lines) {
            return pickLineTime(lines, false);
        }

        /** START: lấy thời điểm muộn nhất trong `lines`. */
        function getLatestTime(lines) {
            return pickLineTime(lines, true);
        }

        function pickLineTime(lines, preferLatest) {
            if (!lines || typeof lines !== 'object') return null;
            let best = null;
            Object.values(lines).forEach(line => {
                const parsed = parseResultLine(line);
                if (!parsed) return;
                const dateTime = parseFirebaseDateTime(parsed.timestampRaw);
                if (!dateTime) return;
                if (best === null) {
                    best = dateTime;
                } else if (preferLatest) {
                    if (dateTime > best) best = dateTime;
                } else if (dateTime < best) {
                    best = dateTime;
                }
            });
            return best;
        }

        /** START: muộn nhất; nếu sớm hơn start_time giải thì lấy start_time. */
        function resolveStartTime(lines, raceStartTime) {
            const latest = getLatestTime(lines);
            if (!latest) return null;
            if (raceStartTime && latest < raceStartTime) return raceStartTime;
            return latest;
        }

        function formatDurationSeconds(totalSeconds) {
            return formatDurationMillis(Math.max(0, Math.round(totalSeconds * 1000)));
        }

        /** Giống ResultsConverter.splitDuration — thời gian tích lũy từ START. */
        function formatCumulativeSplit(startTime, endTime) {
            if (!startTime || !endTime) return '';
            const diffMs = Math.max(0, Math.round(endTime - startTime));
            return `+${formatDurationMillis(diffMs)}`;
        }

        /** RACE_SCRIPT: `cp1_distance` … km tích lũy từ START (theo Setup iOS). */
        function loadCpDistancesCumulativeKm(eventData) {
            const script = (eventData && eventData.RACE_SCRIPT) || {};
            const out = {};
            for (let i = 1; i <= 8; i++) {
                const cp = `CP${i}`;
                const key = `${cp.toLowerCase()}_distance`;
                const raw = script[key];
                if (raw == null || !String(raw).trim()) continue;
                const km = parseDistance(String(raw));
                if (km > 0) out[cp] = km;
            }
            return out;
        }

        function getCumulativeKmAtCheckpoint(cp, cpDistancesCumulative, athleteDistanceKm) {
            if (cp === 'START') return 0;
            if (cp === 'FINISH') return athleteDistanceKm;
            return cpDistancesCumulative[cp] || 0;
        }

        function getSegmentKm(prevCp, cp, cpDistancesCumulative, athleteDistanceKm) {
            const endKm = getCumulativeKmAtCheckpoint(cp, cpDistancesCumulative, athleteDistanceKm);
            const startKm = getCumulativeKmAtCheckpoint(prevCp, cpDistancesCumulative, athleteDistanceKm);
            const seg = endKm - startKm;
            return seg > 0 ? seg : 0;
        }

        function buildCheckpointTimingLines(times, checkpoints, cpDistancesCumulative, athlete) {
            if (!times || !times['START'] || !Array.isArray(checkpoints)) return [];
            const athleteDistanceKm = parseDistance(athlete && athlete.distance);
            const ordered = ALL_CHECKPOINTS.filter(cp => checkpoints.includes(cp) && times[cp]);
            const lines = [];
            let prevCp = 'START';
            let prevTime = times['START'];

            ordered.forEach(cp => {
                if (cp === 'START') return;
                const t = times[cp];
                const segmentSec = (t - prevTime) / 1000;
                const cumulativeSec = (t - times['START']) / 1000;
                const segmentKm = getSegmentKm(prevCp, cp, cpDistancesCumulative, athleteDistanceKm);
                const cumulativeKm = getCumulativeKmAtCheckpoint(cp, cpDistancesCumulative, athleteDistanceKm);

                lines.push({
                    fromCp: prevCp,
                    cp,
                    clock: formatTime(t),
                    cumulative: formatCumulativeSplit(times['START'], t),
                    segment: segmentSec >= 0 ? formatDurationMillis((t - prevTime)) : '',
                    segmentKm,
                    segmentPace: segmentKm > 0 && segmentSec >= 0 ? calculatePace(segmentSec, segmentKm) : '',
                    cumulativeKm,
                    cumulativePace: cumulativeKm > 0 && cumulativeSec >= 0 ? calculatePace(cumulativeSec, cumulativeKm) : ''
                });

                prevCp = cp;
                prevTime = t;
            });
            return lines;
        }

        // Function to format time as HH:MM:SS.SSS
        function formatTime(date) {
            if (!date) return '';
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            const ms = date.getMilliseconds().toString().padStart(3, '0');
            return `${hours}:${minutes}:${seconds}.${ms}`;
        }

        // Function to convert Firebase data to array format (Excel-like)
        function convertFirebaseDataToArray(firebaseData) {
            if (!firebaseData) return null;
            
            // Get the event data - it could be under any key (event_name)
            const eventKey = Object.keys(firebaseData)[0];
            if (!eventKey) return null;
            
            const eventData = firebaseData[eventKey];
            const athletes = eventData.Athletes || {};
            
            console.log('convertFirebaseDataToArray - Athletes count:', Object.keys(athletes).length);
            
            // First, collect all unique distances from athletes to know how many distances we have
            const uniqueDistances = new Set();
            Object.keys(athletes).forEach(tagId => {
                const athlete = athletes[tagId];
                if (athlete && athlete.distance) {
                    const distance = String(athlete.distance).trim();
                    if (distance) {
                        uniqueDistances.add(distance);
                    }
                }
            });
            console.log('convertFirebaseDataToArray - Unique distances found:', Array.from(uniqueDistances));
            
            const allCheckpoints = ALL_CHECKPOINTS;
            const checkpointData = {};
            allCheckpoints.forEach(cp => {
                checkpointData[cp] = eventData[cp] || {};
            });
            
            // Find which checkpoints have data
            const availableCheckpoints = [];
            allCheckpoints.forEach(cp => {
                const cpData = checkpointData[cp];
                const hasData = Object.keys(cpData).some(tagId => {
                    const lines = cpData[tagId]?.lines || {};
                    return Object.keys(lines).length > 0;
                });
                if (hasData) {
                    availableCheckpoints.push(cp);
                }
            });
            
            // Check if there are any checkpoint data
            const hasCheckpointData = availableCheckpoints.length > 0;
            console.log('convertFirebaseDataToArray - hasCheckpointData:', hasCheckpointData, 'availableCheckpoints:', availableCheckpoints);
            
            // If no athletes found, return empty result
            if (Object.keys(athletes).length === 0) {
                console.log('convertFirebaseDataToArray - No athletes found');
                return {};
            }
            
            // Create header row based on whether we have checkpoint data
            // If no checkpoint data: show only athlete list (BIB, Name, Gen, Nhóm tuổi, Distance)
            // If has checkpoint data: full results (..., Nhóm tuổi, Distance, Checkpoints, Chip Time)
            const header = hasCheckpointData 
                ? ['BIB', 'Name', 'Gen', 'Nhóm tuổi', 'Distance', ...availableCheckpoints, 'Chip Time']
                : ['BIB', 'Name', 'Gen', 'Nhóm tuổi', 'Distance'];
            
            // Parse RACE_CONFIG.start_time để dùng làm START khi VĐV có checkpoint khác nhưng không có START
            const raceConfig = eventData.RACE_CONFIG || {};
            const raceStartTimeStr = raceConfig.start_time;
            const raceStartTime = raceStartTimeStr ? parseFirebaseDateTime(raceStartTimeStr) : null;
            const cpDistancesCumulative = loadCpDistancesCumulativeKm(eventData);
            
            // Create data rows
            const rows = [];
            const rowsMetadata = []; // Store times for split calculation
            
            // Always process all athletes from Athletes node
            Object.keys(athletes).forEach(tagId => {
                const athlete = athletes[tagId];
                if (!athlete) return;
                
                if (hasCheckpointData) {
                    // HAS CHECKPOINT DATA: Show full results with checkpoint times
                    // Get times for this athlete
                    const times = {};
                    availableCheckpoints.forEach(cp => {
                        const lines = checkpointData[cp][tagId]?.lines || {};
                        if (cp === 'START') {
                            times[cp] = resolveStartTime(lines, raceStartTime);
                        } else {
                            times[cp] = getEarliestTime(lines);
                        }
                    });
                    
                    // Nếu VĐV có checkpoint khác mà không có START thì lấy start_time làm START
                    if (!times['START'] && raceStartTime) {
                        const hasOtherCheckpoint = availableCheckpoints.some(cp => cp !== 'START' && times[cp]);
                        if (hasOtherCheckpoint) {
                            times['START'] = raceStartTime;
                        }
                    }
                    
                    // Calculate Chip Time (FINISH - START)
                    const startTime = times['START'];
                    const finishTime = times['FINISH'];
                    const chipTime = calculateTimeDifference(startTime, finishTime);
                    
                    const ageGroupVal = athlete.age != null ? String(athlete.age).trim() : '';
                    // Create row with checkpoint data and chip time
                    const row = [
                        athlete.bib || '',
                        athlete.name || '',
                        athlete.gen || '',
                        ageGroupVal,
                        athlete.distance || '',
                        ...availableCheckpoints.map(cp => times[cp] ? formatTime(times[cp]) : ''),
                        chipTime
                    ];
                    
                    rows.push(row);
                    
                    // Store metadata for split time calculation
                    rowsMetadata.push({
                        tagId: tagId,
                        times: times,
                        athlete: athlete
                    });
                } else {
                    // NO CHECKPOINT DATA: Show only athlete list from Athletes node
                    const ageGroupVal = athlete.age != null ? String(athlete.age).trim() : '';
                    const row = [
                        athlete.bib || '',
                        athlete.name || '',
                        athlete.gen || '',
                        ageGroupVal,
                        athlete.distance || ''
                    ];
                    
                    rows.push(row);
                    
                    // Store metadata (no times since no checkpoint data)
                    rowsMetadata.push({
                        tagId: tagId,
                        times: {},
                        athlete: athlete
                    });
                }
            });
            
            console.log('convertFirebaseDataToArray - Total rows created:', rows.length);
            
            // Group rows by distance dynamically
            const distanceGroups = {};
            
            rows.forEach((row, index) => {
                const distance = String(row[4] || '').trim();
                // If no distance, use "All" as default to ensure athletes are still displayed
                const distanceKey = distance || 'All';
                
                if (!distanceGroups[distanceKey]) {
                    distanceGroups[distanceKey] = {
                        rows: [],
                        metadata: []
                    };
                }
                
                distanceGroups[distanceKey].rows.push(row);
                distanceGroups[distanceKey].metadata.push(rowsMetadata[index]);
            });
            
            console.log('convertFirebaseDataToArray - Distance groups after grouping:', Object.keys(distanceGroups));
            
            // Ensure all unique distances have a group (even if no rows yet)
            // This is important to show tabs for all distances found in Athletes
            uniqueDistances.forEach(distance => {
                if (!distanceGroups[distance]) {
                    console.log(`convertFirebaseDataToArray - Creating empty group for distance: ${distance}`);
                    distanceGroups[distance] = {
                        rows: [],
                        metadata: []
                    };
                }
            });
            
            // If no rows at all, but we have athletes, create rows for all athletes
            if (rows.length === 0 && Object.keys(athletes).length > 0) {
                console.log('convertFirebaseDataToArray - No rows but has athletes, creating rows for all athletes');
                // Create rows from all athletes
                Object.keys(athletes).forEach(tagId => {
                    const athlete = athletes[tagId];
                    if (!athlete) return;
                    
                    const distance = String(athlete.distance || '').trim();
                    const distanceKey = distance || 'All';
                    
                    const ageGroupVal = athlete.age != null ? String(athlete.age).trim() : '';
                    const row = [
                        athlete.bib || '',
                        athlete.name || '',
                        athlete.gen || '',
                        ageGroupVal,
                        athlete.distance || ''
                    ];
                    
                    if (!distanceGroups[distanceKey]) {
                        distanceGroups[distanceKey] = {
                            rows: [],
                            metadata: []
                        };
                    }
                    
                    distanceGroups[distanceKey].rows.push(row);
                    distanceGroups[distanceKey].metadata.push({
                        tagId: tagId,
                        times: {},
                        athlete: athlete
                    });
                });
            }
            
            // Convert to return format
            const result = {};
            Object.keys(distanceGroups).forEach(distanceKey => {
                result[distanceKey] = {
                    data: [header, ...distanceGroups[distanceKey].rows],
                    metadata: distanceGroups[distanceKey].metadata,
                    checkpoints: availableCheckpoints,
                    cpDistancesCumulative,
                    distance: distanceKey
                };
            });
            
            console.log('convertFirebaseDataToArray - Final result keys:', Object.keys(result));
            Object.keys(result).forEach(key => {
                console.log(`convertFirebaseDataToArray - ${key}: ${result[key].data.length} rows (including header)`);
            });
            
            return result;
        }

        // Function to update race name in UI (displayName = tiêu đề, eventKeyForLogic = phân loại EKIDEN/tab)
        function updateRaceName(displayName, eventKeyForLogic) {
            console.log('updateRaceName called with:', displayName, eventKeyForLogic);
            
            if (displayName && typeof displayName === 'string' && displayName.trim()) {
                const titleText = displayName.trim();
                const logicKey = (eventKeyForLogic && String(eventKeyForLogic).trim()) ? eventKeyForLogic : titleText;
                
                document.title = `Kết quả ${titleText}`;
                
                const updateHeader = () => {
                    const titleElement = document.getElementById('race-title');
                    if (titleElement) {
                        titleElement.textContent = titleText;
                    } else {
                        setTimeout(updateHeader, 100);
                    }
                };
                updateHeader();
                setupTabsBasedOnEventName(logicKey);
            }
        }

        function applyFirebaseEventData(firebaseData, eventKeyForLogic, displayName) {
            const raceConfig = firebaseData.RACE_CONFIG || {};
            const startTimeStr = raceConfig.start_time;
            const startTimeEl = document.getElementById('race-start-time');
            if (startTimeEl) {
                startTimeEl.textContent = startTimeStr ? formatStartTimeDisplay(startTimeStr) : '';
                startTimeEl.style.display = startTimeStr ? 'block' : 'none';
            }

            const titleName = getEventDisplayName(firebaseData, displayName || eventKeyForLogic);
            updateRaceName(titleName, eventKeyForLogic);

            const convertedData = convertFirebaseDataToArray({ [eventKeyForLogic]: firebaseData });

            console.log('applyFirebaseEventData - convertedData keys:', convertedData ? Object.keys(convertedData) : 'null');

            if (!convertedData || Object.keys(convertedData).length === 0) {
                throw new Error('Dữ liệu không hợp lệ hoặc chưa có vận động viên');
            }

            window.ageGroupFilters = {};
            window.tableSources = {};

            const isEkiden = eventKeyForLogic.includes('EKIDEN') || eventKeyForLogic.includes('Ekiden')
                || titleName.includes('EKIDEN') || titleName.includes('Ekiden');
            console.log('applyFirebaseEventData - isEkiden:', isEkiden);

            if (isEkiden) {
                let race14Data = null;
                let race3Data = null;

                Object.keys(convertedData).forEach(distanceKey => {
                    const distance = String(distanceKey).trim().toUpperCase();
                    if (distance.includes('14.4') || distance.includes('14,4')) {
                        race14Data = convertedData[distanceKey];
                    } else if (distance.includes('3.6') || distance.includes('3,6')) {
                        race3Data = convertedData[distanceKey];
                    }
                });

                if (race14Data) {
                    const loading14 = document.getElementById('loading-14');
                    if (loading14) loading14.style.display = 'none';
                    createTable(race14Data.data, 'table-14', 'Overall', race14Data.data,
                               race14Data.metadata, race14Data.checkpoints, 'All', race14Data.cpDistancesCumulative);
                }

                if (race3Data) {
                    const loading3Overall = document.getElementById('loading-3-overall');
                    const loading3Female = document.getElementById('loading-3-female');
                    const loading3Male = document.getElementById('loading-3-male');
                    if (loading3Overall) loading3Overall.style.display = 'none';
                    if (loading3Female) loading3Female.style.display = 'none';
                    if (loading3Male) loading3Male.style.display = 'none';

                    window.tableSources.ekiden3 = {
                                    data: race3Data.data,
                                    metadata: race3Data.metadata,
                                    checkpoints: race3Data.checkpoints,
                                    cpDistancesCumulative: race3Data.cpDistancesCumulative
                                };
                    window.ageGroupFilters.ekiden3 = 'All';
                    injectAgeGroupControls(document.getElementById('race-3-age-anchor'), 'ekiden3', race3Data.metadata);

                    const cpDist3 = race3Data.cpDistancesCumulative || {};
                    createTable(race3Data.data, 'table-3-overall', 'Overall', race3Data.data,
                               race3Data.metadata, race3Data.checkpoints, 'All', cpDist3);
                                createTable(race3Data.data, 'table-3-female', 'Female', race3Data.data,
                                           race3Data.metadata, race3Data.checkpoints, 'All', cpDist3);
                                createTable(race3Data.data, 'table-3-male', 'Male', race3Data.data,
                                           race3Data.metadata, race3Data.checkpoints, 'All', cpDist3);
                }
            } else {
                const distances = Object.keys(convertedData);
                if (distances.length === 0) {
                    throw new Error('Không tìm thấy dữ liệu cự ly');
                }

                createDistanceTabs(distances);

                distances.forEach((distance, index) => {
                    const distanceData = convertedData[distance];
                    if (!distanceData) return;

                    const ns = 'dist-' + index;
                                window.tableSources[ns] = {
                                    data: distanceData.data,
                                    metadata: distanceData.metadata,
                                    checkpoints: distanceData.checkpoints,
                                    cpDistancesCumulative: distanceData.cpDistancesCumulative
                                };
                    window.ageGroupFilters[ns] = 'All';
                    injectAgeGroupControls(document.getElementById(`distance-${index}-age-anchor`), ns, distanceData.metadata);

                    const loadingOverall = document.getElementById(`loading-${index}-overall`);
                    const loadingFemale = document.getElementById(`loading-${index}-female`);
                    const loadingMale = document.getElementById(`loading-${index}-male`);
                    if (loadingOverall) loadingOverall.style.display = 'none';
                    if (loadingFemale) loadingFemale.style.display = 'none';
                    if (loadingMale) loadingMale.style.display = 'none';

                    const cpDist = distanceData.cpDistancesCumulative || {};
                    createTable(distanceData.data, `table-${index}-overall`, 'Overall', distanceData.data,
                               distanceData.metadata, distanceData.checkpoints, 'All', cpDist);
                                createTable(distanceData.data, `table-${index}-female`, 'Female', distanceData.data,
                                           distanceData.metadata, distanceData.checkpoints, 'All', cpDist);
                                createTable(distanceData.data, `table-${index}-male`, 'Male', distanceData.data,
                                           distanceData.metadata, distanceData.checkpoints, 'All', cpDist);
                });
            }
        }

        /** Tải giải từ path {uid}/{eventKey} (iOS) hoặc {eventKey} (legacy) */
        function loadDataFromFirebase(uid, eventKey, displayNameHint) {
            const dbPath = buildEventDbPath(uid, eventKey);
            if (!dbPath) {
                console.log('No event path provided');
                return;
            }

            console.log('Loading Firebase path:', dbPath);
            activeEventContext = { uid: uid || '', eventKey, dbPath };
            updateCopyLinkButton();

            const dataRef = window.firebaseRef(window.firebaseDatabase, dbPath);
            window.firebaseGet(dataRef)
                .then((snapshot) => {
                    if (!snapshot.exists()) {
                        throw new Error('Không tìm thấy dữ liệu giải trên Firebase');
                    }
                    applyFirebaseEventData(snapshot.val(), eventKey, displayNameHint);
                    attachFirebaseListener(dbPath, (firebaseData) => {
                        try {
                            applyFirebaseEventData(firebaseData, eventKey, displayNameHint);
                            updateCopyLinkButton();
                        } catch (err) {
                            console.error('Realtime update error:', err);
                        }
                    });
                })
                .catch(error => {
                    showGlobalError(error.message);
                    console.error('Firebase error:', error);
                });
        }

        async function initializeFromFirebase() {
            if (!window.firebaseDatabase || !window.firebaseRef || !window.firebaseGet || !window.firebaseOnValue) {
                setTimeout(initializeFromFirebase, 500);
                return;
            }

            try {
                const target = await resolveEventTarget();
                console.log('Resolved event:', target);
                if (target.dbPath === '' && target.eventKey) {
                    // Fixture mode: index.html?fixture=fixture_basic.json
                    await window.__loadFixture(target.eventKey, target.eventKey);
                    return;
                }
                loadDataFromFirebase(target.uid, target.eventKey, target.displayName);
            } catch (error) {
                showGlobalError(error.message);
                console.error('initializeFromFirebase:', error);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const checkFirebase = setInterval(() => {
                if (window.firebaseDatabase && window.firebaseRef && window.firebaseGet && window.firebaseOnValue) {
                    clearInterval(checkFirebase);
                    setTimeout(initializeFromFirebase, 200);
                }
            }, 100);

            setTimeout(() => {
                clearInterval(checkFirebase);
                if (!window.firebaseDatabase) {
                    showGlobalError('Không thể kết nối Firebase');
                }
            }, 10000);
        });
    </script>
</body>
